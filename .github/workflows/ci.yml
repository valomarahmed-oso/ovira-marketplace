name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  storefront:
    name: Storefront (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: storefront
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: storefront/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  backend:
    name: Backend (syntax + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check
        run: python -m compileall -q backend/ovira_marketplace/ovira_marketplace
      # Advisory for now — surfaces lint issues without failing the build. Flip
      # to blocking (drop continue-on-error) once the existing code is clean.
      - name: Ruff lint (advisory)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check backend/ovira_marketplace
