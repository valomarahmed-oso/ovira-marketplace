# Ovira storefront + reverse proxy.
# The ERPNext / Frappe stack runs from its own compose; this file adds the
# Next.js storefront and an nginx proxy that puts storefront + Frappe API on one
# origin. Join the existing Frappe docker network so nginx can reach `backend`.

services:
  storefront:
    build:
      context: ../storefront
    environment:
      - NEXT_PUBLIC_FRAPPE_URL=${FRAPPE_URL:-}
    restart: unless-stopped
    networks:
      - ovira

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/ovira.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - storefront
    restart: unless-stopped
    networks:
      - ovira
      - frappe

networks:
  ovira:
    driver: bridge
  frappe:
    external: true
    name: ${FRAPPE_NETWORK:-frappe_docker_default}
