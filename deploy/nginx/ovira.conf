# Same-origin reverse proxy for the Ovira storefront.
#   /api, /app, /assets, /files, /socket.io, ...  -> Frappe (the demo site)
#   everything else                                -> the Next.js storefront
# Frappe resolves the site by the Host header, so we rewrite Host to the backing
# site name (the storefront is served from a different subdomain, but cookies are
# set without a Domain attribute so the browser scopes them to the storefront's
# origin — login/session works).

upstream ovira_storefront {
    server storefront:3000;
}

# Frappe's own nginx (frappe_docker service "frontend") already routes assets,
# socket.io, etc. correctly; we just hand it the right Host.
upstream ovira_frappe {
    server frontend:8080;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    location ~ ^/(api|app|assets|files|private|method|socket\.io|recorder|login|app\.html)(/|$) {
        proxy_pass http://ovira_frappe;
        proxy_set_header Host demo.ovira.cloud;      # backing Frappe site
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        proxy_pass http://ovira_storefront;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
