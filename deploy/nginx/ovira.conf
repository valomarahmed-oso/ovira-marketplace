upstream ovira_storefront {
    server storefront:3000;
}

# The Frappe backend service on the external network (frappe_docker names it `backend`).
upstream ovira_frappe {
    server backend:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    # Frappe: API, desk, auth, files, assets, realtime — same origin as the store.
    location ~ ^/(api|app|assets|files|private|method|socket\.io|recorder|login|app\.html)/ {
        proxy_pass http://ovira_frappe;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Everything else: the Next.js storefront.
    location / {
        proxy_pass http://ovira_storefront;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
